services:
  cursorpipe:
    build: .
    ports:
      - "8080:8080"
    environment:
      - CURSOR_API_KEY=${CURSOR_API_KEY}
      - CURSORPIPE_POOL_SIZE=${CURSORPIPE_POOL_SIZE:-5}
      - CURSORPIPE_BEARER_TOKEN=${CURSORPIPE_BEARER_TOKEN:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
