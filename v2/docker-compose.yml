services:
  cursorpipe:
    build: .
    ports:
      - "8080:8080"
    environment:
      # Required — get from https://cursor.com/settings → API Keys
      - CURSOR_API_KEY=${CURSOR_API_KEY}

      # Server
      - CURSORPIPE_HOST=0.0.0.0
      - CURSORPIPE_PORT=8080

      # Optional: uncomment to protect the API with a bearer token
      # - CURSORPIPE_BEARER_TOKEN=supersecret

      # CORS: allow all origins by default (required for browser clients)
      - CURSORPIPE_CORS_ORIGINS=*

      # Agent
      - CURSORPIPE_MODEL=composer-2.5
      - CURSORPIPE_WORKSPACE=/app

      # Sessions
      - CURSORPIPE_SESSION_TTL_MINUTES=30

      # Features
      - CURSORPIPE_EXPOSE_THINKING=false

      # Logging (debug | info | warning | error | critical)
      - CURSORPIPE_LOG_LEVEL=info

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
